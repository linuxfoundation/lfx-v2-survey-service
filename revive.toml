# When set to true, ignores files with "GENERATED" header; when set to false, lints them (similar to golint behavior)
ignoreGeneratedHeader = true

# Disabled rules
# [rule.package-comments] is disabled because it incorrectly flags every package file as
# missing a package comment when you should only need to add a comment to one of the package files.
[rule.package-comments]
Disabled = true

# [rule.dot-imports] is disabled because the goa design files use dot imports by convention.
[rule.dot-imports]
Disabled = true
